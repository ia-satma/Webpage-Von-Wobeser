# CI — Von Wobeser (VWYS-AI)
#
# Cierra dos brechas detectadas en las auditorías:
#  1) El "verde local" en macOS no garantiza verde en Linux (el CI/Replit corren
#     Linux). Aquí se compila, typechequea, testea y construye en ubuntu-latest.
#  2) El hazard del "cascarón": si el build de prod queda mutilado (chunks de
#     dist/public/assets faltantes), el server cae al fallback index.html y el
#     navegador recibe HTML donde espera JS -> página en blanco. El smoke
#     (scripts/smoke-test.ts) detecta justo eso sirviendo el build real de prod.
#
# El smoke necesita Postgres (server/db.ts lanza si falta DATABASE_URL). Se
# levanta un Postgres efímero como service y se aplica el esquema con db:push.
# Como el smoke incluye aserciones sobre DATOS sembrados (faqs/pro-bono/news con
# items, 143 abogados, etc.) que NO existen en una DB recién creada, el paso de
# smoke es best-effort (continue-on-error): valida boot + anti-cascarón + el
# contrato de seguridad/HTTP sin tumbar el CI por falta de seed. Los gates duros
# son check + test + build.

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    # Postgres efímero para que el server arranque y el smoke pueda pegarle.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vonwobeser
          POSTGRES_PASSWORD: vonwobeser
          POSTGRES_DB: vonwobeser_ci
        ports:
          - 5432:5432
        # Espera a que Postgres acepte conexiones antes de arrancar los pasos.
        options: >-
          --health-cmd "pg_isready -U vonwobeser -d vonwobeser_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DB local (node-postgres, NO Neon): server/db.ts usa el driver pg cuando
      # la URL no es de neon.tech y no hay REPL_ID.
      DATABASE_URL: postgresql://vonwobeser:vonwobeser@localhost:5432/vonwobeser_ci
      # El smoke pega por defecto a :5001; arrancamos el prod en ese mismo puerto
      # (start usa PORT, default 5000) para que coincidan sin pasar baseUrl.
      PORT: "5001"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # --- Gates duros: si fallan, el CI falla ---
      - name: Typecheck (tsc)
        run: npm run check

      - name: Tests (vitest)
        run: npm test

      - name: Build de producción
        run: npm run build

      # --- Esquema en la DB efímera (necesario para que el server arranque) ---
      - name: Aplicar esquema (drizzle push)
        run: npm run db:push

      # --- Smoke: arranca el build de prod y ejercita la API real ---
      # best-effort: el server arranca contra una DB SIN seed, así que las
      # aserciones de "data: ... > 0 items" fallarán por diseño. Lo valioso aquí
      # es que el server BOOTEA y que el script de entrada se sirve como JS (no
      # como HTML) -> detecta el cascarón. No tumba el CI por falta de datos.
      - name: Smoke (build de prod, best-effort)
        continue-on-error: true
        run: |
          NODE_ENV=production node dist/index.cjs &
          SERVER_PID=$!
          echo "Server arrancado (PID $SERVER_PID) en :$PORT"

          # Espera a que el server responda (hasta ~30s) antes del smoke.
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:$PORT/" >/dev/null 2>&1; then
              echo "Server listo tras ${i}s"
              break
            fi
            sleep 1
          done

          set +e
          npx tsx scripts/smoke-test.ts "http://localhost:$PORT"
          SMOKE_EXIT=$?
          set -e

          kill "$SERVER_PID" 2>/dev/null || true
          echo "Smoke terminó con código $SMOKE_EXIT (best-effort; no tumba el CI)"
